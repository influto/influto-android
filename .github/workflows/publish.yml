name: Publish (Maven Central)

# Publishes to.influ:android-sdk / -sdk-ui / -sdk-billing to Maven Central via the Central
# Portal. Credentials come from repo secrets (MAVEN_CENTRAL_* + SIGNING_IN_MEMORY_KEY*).
# Manual trigger: bump the version in the build files first, then run this workflow.
# Requires the `to.influ` namespace to be Verified in the Central Portal.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Publish + release
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew publishToMavenCentral --no-daemon --no-configuration-cache --stacktrace
